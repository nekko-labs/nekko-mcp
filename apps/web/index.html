<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NekkoMCP — local-first runtime & manager for MCP servers. Every MCP server, one endpoint." />
    <title>NekkoMCP — every MCP server, one endpoint</title>
    <script>
      // Apply the saved theme before paint (no flash). Default: medium.
      try {
        var t = localStorage.getItem('nekko-theme') || 'medium';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'medium');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
