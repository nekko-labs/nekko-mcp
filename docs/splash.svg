<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4683f"/>
      <stop offset="1" stop-color="#8b6dff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16140f"/>
      <stop offset="1" stop-color="#211f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#8b6dff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b6dff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#f4f0e9" fill-opacity="0.06"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="600" fill="url(#bg)"/>
  <rect width="1280" height="600" fill="url(#dots)"/>
  <rect width="1280" height="600" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- left: wordmark + tagline -->
  <g transform="translate(84, 150)">
    <g transform="translate(0,-2)">
      <text font-size="34">🐈</text>
    </g>
    <text x="56" y="6" font-size="30" font-weight="700" fill="#8f877d" letter-spacing="1">NEKKO LABS</text>
    <text x="-2" y="120" font-size="92" font-weight="800" letter-spacing="-2" fill="url(#accent)">NekkoMCP</text>
    <text x="2" y="182" font-size="30" font-weight="600" fill="#f4f0e9">Run MCP servers securely.</text>
    <text x="2" y="226" font-size="20" fill="#bdb5a8">A local-first ToolHive rival — supervise servers, isolate them your way,</text>
    <text x="2" y="254" font-size="20" fill="#bdb5a8">and expose a single endpoint to Claude Code, Cursor, or Open Paw.</text>

    <g transform="translate(0, 300)" font-size="18" font-weight="600">
      <g>
        <rect x="0" y="0" width="150" height="40" rx="20" fill="#211f1a" stroke="#302d27"/>
        <text x="75" y="26" text-anchor="middle" fill="#ff7a59">local-first</text>
      </g>
      <g transform="translate(166,0)">
        <rect x="0" y="0" width="240" height="40" rx="20" fill="#211f1a" stroke="#302d27"/>
        <text x="120" y="26" text-anchor="middle" fill="#9b6dff">process or Docker isolation</text>
      </g>
      <g transform="translate(422,0)">
        <rect x="0" y="0" width="92" height="40" rx="20" fill="#211f1a" stroke="#302d27"/>
        <text x="46" y="26" text-anchor="middle" fill="#45b483">MIT</text>
      </g>
    </g>
  </g>

  <!-- right: servers → gateway → agents motif -->
  <g transform="translate(700, 150)" filter="url(#soft)">
    <!-- managed servers -->
    <g font-size="15" fill="#f4f0e9" text-anchor="middle">
      <g transform="translate(0,0)"><rect width="120" height="52" rx="12" fill="#211f1a" stroke="#3e3a33"/><text x="60" y="31">filesystem</text></g>
      <g transform="translate(0,80)"><rect width="120" height="52" rx="12" fill="#211f1a" stroke="#3e3a33"/><text x="60" y="31">github</text></g>
      <g transform="translate(0,160)"><rect width="120" height="52" rx="12" fill="#211f1a" stroke="#3e3a33"/><text x="60" y="31">nekko-vault</text></g>
      <g transform="translate(0,240)"><rect width="120" height="52" rx="12" fill="#211f1a" stroke="#3e3a33"/><text x="60" y="31">postgres</text></g>
    </g>

    <!-- links to gateway -->
    <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.85">
      <path d="M120 26 C 180 26, 190 150, 250 150"/>
      <path d="M120 106 C 180 106, 200 150, 250 150"/>
      <path d="M120 186 C 180 186, 200 150, 250 150"/>
      <path d="M120 266 C 180 266, 190 150, 250 150"/>
    </g>

    <!-- gateway hub -->
    <g transform="translate(250,108)">
      <rect width="96" height="84" rx="18" fill="url(#accent)"/>
      <text x="48" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#16140f">GATE</text>
      <text x="48" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#16140f">WAY</text>
    </g>

    <!-- gateway → agent -->
    <path d="M346 150 C 380 150, 380 150, 410 150" stroke="#f4f0e9" stroke-opacity="0.5" stroke-width="2.5" fill="none"/>

    <!-- agent -->
    <g transform="translate(410,118)">
      <rect width="120" height="64" rx="14" fill="#211f1a" stroke="#3e3a33"/>
      <text x="60" y="30" text-anchor="middle" font-size="15" fill="#f4f0e9">your agent</text>
      <text x="60" y="50" text-anchor="middle" font-size="13" fill="#8f877d">one endpoint</text>
    </g>
  </g>
</svg>
